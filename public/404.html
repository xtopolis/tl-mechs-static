<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting…</title>
  <script>
    // Redirect old Hugo /docs/... URLs to new paths (strip /docs/ prefix)
    var path = window.location.pathname;
    if (path.startsWith('/docs/')) {
      var newPath = path.slice('/docs'.length) || '/';
      window.location.replace(newPath + window.location.search + window.location.hash);
    } else {
      document.addEventListener('DOMContentLoaded', function () {
        document.body.innerHTML = '<div style="font-family:sans-serif;max-width:600px;margin:4rem auto;padding:0 1rem"><h1>Page not found</h1><p>The page <strong>' + path + '</strong> could not be found.</p><p><a href="/">Return to home</a></p></div>';
      });
    }
  </script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
